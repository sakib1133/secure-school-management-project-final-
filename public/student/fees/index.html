<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Fees - Student Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary-color: #3b82f6;
            --secondary-color: #2563eb;
            --accent-color: #60a5fa;
            --success-color: #22c55e;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --dark-bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            min-height: 100vh;
            color: var(--text-primary);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #1e3a5f 0%, #2d4a6f 100%);
            color: white;
            padding: 30px 40px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-lg);
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 i {
            color: var(--accent-color);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--border-color);
        }

        .card-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-header h2 i {
            color: var(--primary-color);
        }

        .fee-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.2s;
        }

        .fee-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .fee-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .fee-amount {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .fee-description {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .fee-details {
            display: flex;
            gap: 20px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .fee-details span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-paid {
            background: #dcfce7;
            color: #166534;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--secondary-color);
            transform: translateY(-1px);
        }

        .btn-success {
            background: var(--success-color);
            color: white;
        }

        .btn-success:hover {
            background: #16a34a;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background: #f8fafc;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            font-size: 0.9rem;
        }

        tr:hover {
            background: #f8fafc;
        }

        .amount {
            font-weight: 600;
            color: var(--text-primary);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            color: var(--border-color);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 450px;
            width: 90%;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--border-color);
        }

        .modal-header h3 {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .close-btn:hover {
            color: var(--danger-color);
        }

        .otp-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1.2rem;
            letter-spacing: 8px;
            text-align: center;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .otp-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-actions .btn {
            flex: 1;
            justify-content: center;
        }

        .otp-info {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            color: #0369a1;
        }

        .otp-info i {
            margin-right: 8px;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .alert-info {
            background: #e0f2fe;
            color: #0369a1;
            border: 1px solid #7dd3fc;
        }

        .alert.show {
            display: block;
        }

        .timer {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .timer.warning {
            color: var(--warning-color);
        }

        .timer.danger {
            color: var(--danger-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="material-icons">payment</i>
                My Fees
            </h1>
        </div>

        <div class="grid">
            <!-- Pending Fees -->
            <div class="card">
                <div class="card-header">
                    <h2>
                        <i class="material-icons">pending_actions</i>
                        Pending Fees
                    </h2>
                    <button class="btn btn-primary" onclick="loadFees()" style="padding: 8px 16px; font-size: 0.85rem;">
                        <i class="material-icons">refresh</i>
                        Refresh
                    </button>
                </div>
                <div id="pendingFees">
                    <div class="empty-state">
                        <i class="material-icons">check_circle</i>
                        <p>No pending fees</p>
                    </div>
                </div>
            </div>

            <!-- Payment History -->
            <div class="card">
                <div class="card-header">
                    <h2>
                        <i class="material-icons">history</i>
                        Payment History
                    </h2>
                    <button class="btn btn-primary" onclick="loadPaymentHistory()" style="padding: 8px 16px; font-size: 0.85rem;">
                        <i class="material-icons">refresh</i>
                        Refresh
                    </button>
                </div>
                <div id="paymentHistory">
                    <div class="empty-state">
                        <i class="material-icons">receipt_long</i>
                        <p>No payment history</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- OTP Modal -->
    <div id="otpModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>
                    <i class="material-icons">verified_user</i>
                    Verify OTP
                </h3>
                <button class="close-btn" onclick="closeOtpModal()">&times;</button>
            </div>

            <div id="modalAlert" class="alert"></div>

            <div class="otp-info">
                <i class="material-icons">info</i>
                Enter the 6-digit OTP sent to your registered email
            </div>

            <input type="text" id="otpInput" class="otp-input" maxlength="6" placeholder="000000" pattern="[0-9]{6}">
            
            <div class="timer" id="otpTimer"></div>

            <div class="modal-actions">
                <button class="btn btn-primary" id="verifyOtpBtn" onclick="verifyOtp()">
                    <i class="material-icons">check</i>
                    Verify OTP
                </button>
                <button class="btn btn-primary" id="resendOtpBtn" onclick="resendOtp()" style="background: var(--secondary-color);">
                    <i class="material-icons">send</i>
                    Resend OTP
                </button>
            </div>

            <div id="paymentDetailsSection" style="display: none; margin-top: 20px; padding-top: 20px; border-top: 2px solid var(--border-color);">
                <h4 style="margin-bottom: 16px; display: flex; align-items: center; gap: 8px;">
                    <i class="material-icons" style="color: var(--primary-color);">account_balance</i>
                    Payment Details
                </h4>
                <div id="paymentDetailsContent" style="max-height: 300px; overflow-y: auto; padding-right: 8px;"></div>
                <div style="margin-top: 20px;">
                    <button class="btn btn-success" id="markPaidBtn" onclick="markAsPaid()" style="width: 100%;">
                        <i class="material-icons">check_circle</i>
                    Submit Payment Request
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/fees';
        let currentFeeId = null;
        let otpTimerInterval = null;

        // Load fees on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadFees();
            loadPaymentHistory();
        });

        // Get auth token
        function getAuthToken() {
            return localStorage.getItem('token');
        }

        // Show alert
        function showAlert(message, type, containerId = 'modalAlert') {
            const alert = document.getElementById(containerId);
            alert.className = `alert alert-${type} show`;
            alert.textContent = message;
            setTimeout(() => {
                alert.classList.remove('show');
            }, 5000);
        }

        // Load fees
        async function loadFees() {
            try {
                const response = await fetch(`${API_BASE}/student`, {
                    headers: {
                        'Authorization': `Bearer ${getAuthToken()}`
                    }
                });

                const data = await response.json();

                if (data.status === 'success') {
                    renderFees(data.fees);
                } else {
                    console.error('Failed to load fees');
                }
            } catch (error) {
                console.error('Error loading fees:', error);
            }
        }

        // Render fees
        function renderFees(fees) {
            const container = document.getElementById('pendingFees');
            const pendingFees = fees.filter(fee => fee.status === 'PENDING' || fee.status === 'pending');

            if (pendingFees.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="material-icons">check_circle</i>
                        <p>No pending fees</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = pendingFees.map(fee => `
                <div class="fee-card">
                    <div class="fee-card-header">
                        <div>
                            <div class="fee-amount">₹${fee.amount.toFixed(2)}</div>
                            <div class="fee-description">${fee.description || 'Fee'}</div>
                        </div>
                        <span class="status-badge status-pending">${fee.status}</span>
                    </div>
                    <div class="fee-details">
                        <span>
                            <i class="material-icons" style="font-size: 16px;">event</i>
                            Due: ${fee.due_date || 'Not specified'}
                        </span>
                    </div>
                    <button class="btn btn-primary" onclick="initiatePayment(${fee.id})">
                        <i class="material-icons">payment</i>
                        Pay Now
                    </button>
                </div>
            `).join('');
        }

        // Load payment history
        async function loadPaymentHistory() {
            try {
                const response = await fetch(`${API_BASE}/payments/history`, {
                    headers: {
                        'Authorization': `Bearer ${getAuthToken()}`
                    }
                });

                const data = await response.json();

                if (data.status === 'success') {
                    renderPaymentHistory(data.payments);
                } else {
                    console.error('Failed to load payment history');
                }
            } catch (error) {
                console.error('Error loading payment history:', error);
            }
        }

        // Render payment history
        function renderPaymentHistory(payments) {
            const container = document.getElementById('paymentHistory');

            if (payments.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="material-icons">receipt_long</i>
                        <p>No payment history</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = payments.map(payment => `
                <div class="fee-card">
                    <div class="fee-card-header">
                        <div>
                            <div class="fee-amount">₹${payment.amount.toFixed(2)}</div>
                            <div class="fee-description">${payment.description || 'Payment'}</div>
                        </div>
                        <span class="status-badge status-paid">${payment.status}</span>
                    </div>
                    <div class="fee-details">
                        <span>
                            <i class="material-icons" style="font-size: 16px;">calendar_today</i>
                            ${new Date(payment.paid_at).toLocaleDateString()}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        // Initiate payment
        async function initiatePayment(feeId) {
            currentFeeId = feeId;
            
            try {
                // Show loading indicator
                showAlert('Sending OTP...', 'info');
                
                // Create AbortController for timeout handling
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000); // 15 second timeout
                
                const response = await fetch(`${API_BASE}/send-otp`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getAuthToken()}`
                    },
                    body: JSON.stringify({ fee_id: feeId }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);
                const data = await response.json();

                if (response.status === 429) {
                    showAlert(data.message || 'Too many OTP requests. Please wait 30 seconds.', 'error');
                    return;
                }

                if (data.status === 'success') {
                    openOtpModal();
                    showAlert('OTP sent successfully!', 'success');
                } else {
                    showAlert(data.message || 'Failed to send OTP', 'error');
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    showAlert('Request timed out. OTP may still be sent - please check your email and try again.', 'error');
                } else {
                    showAlert('Error sending OTP. Please try again.', 'error');
                }
                console.error('Error:', error);
            }
        }

        // Open OTP modal
        function openOtpModal() {
            document.getElementById('otpModal').classList.add('show');
            document.getElementById('otpInput').value = '';
            document.getElementById('completePaymentBtn').style.display = 'none';
            document.getElementById('verifyOtpBtn').style.display = 'inline-flex';
            startOtpTimer();
        }

        // Close OTP modal
        function closeOtpModal() {
            document.getElementById('otpModal').classList.remove('show');
            if (otpTimerInterval) {
                clearInterval(otpTimerInterval);
            }
            currentFeeId = null;
        }

        // Start OTP timer
        function startOtpTimer() {
            let seconds = 300; // 5 minutes
            const timerElement = document.getElementById('otpTimer');
            
            if (otpTimerInterval) {
                clearInterval(otpTimerInterval);
            }

            otpTimerInterval = setInterval(() => {
                seconds--;
                const minutes = Math.floor(seconds / 60);
                const remainingSeconds = seconds % 60;
                
                timerElement.textContent = `OTP expires in ${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
                
                if (seconds <= 60) {
                    timerElement.classList.add('warning');
                }
                if (seconds <= 30) {
                    timerElement.classList.add('danger');
                }
                
                if (seconds <= 0) {
                    clearInterval(otpTimerInterval);
                    timerElement.textContent = 'OTP has expired';
                    showAlert('OTP has expired. Please request a new OTP.', 'error');
                }
            }, 1000);
        }

        // Verify OTP
        async function verifyOtp() {
            const otp = document.getElementById('otpInput').value;

            if (!otp || otp.length !== 6) {
                showAlert('Please enter a valid 6-digit OTP', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/verify-otp`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getAuthToken()}`
                    },
                    body: JSON.stringify({ fee_id: currentFeeId, otp: otp })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    showAlert('OTP verified successfully!', 'success');
                    document.getElementById('verifyOtpBtn').style.display = 'none';
                    document.getElementById('resendOtpBtn').style.display = 'none';
                    document.getElementById('otpInput').style.display = 'none';
                    document.querySelector('.otp-info').style.display = 'none';
                    if (otpTimerInterval) {
                        clearInterval(otpTimerInterval);
                    }
                    // Load and show payment details
                    await loadPaymentDetails();
                } else {
                    showAlert(data.message || 'Invalid OTP', 'error');
                }
            } catch (error) {
                showAlert('Error verifying OTP. Please try again.', 'error');
                console.error('Error:', error);
            }
        }

        // Resend OTP
        async function resendOtp() {
            if (!currentFeeId) return;

            try {
                const response = await fetch(`${API_BASE}/send-otp`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getAuthToken()}`
                    },
                    body: JSON.stringify({ fee_id: currentFeeId })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    showAlert('New OTP sent successfully!', 'success');
                    document.getElementById('otpInput').value = '';
                    document.getElementById('verifyOtpBtn').style.display = 'inline-flex';
                    document.getElementById('resendOtpBtn').style.display = 'inline-flex';
                    document.getElementById('otpInput').style.display = 'block';
                    document.querySelector('.otp-info').style.display = 'block';
                    document.getElementById('paymentDetailsSection').style.display = 'none';
                    startOtpTimer();
                } else {
                    showAlert(data.message || 'Failed to resend OTP', 'error');
                }
            } catch (error) {
                showAlert('Error resending OTP. Please try again.', 'error');
                console.error('Error:', error);
            }
        }

        // Load payment details
        async function loadPaymentDetails() {
            try {
                // Get fee amount for QR code
                const feeResponse = await fetch(`${API_BASE}/student`, {
                    headers: {
                        'Authorization': `Bearer ${getAuthToken()}`
                    }
                });
                const feeData = await feeResponse.json();
                const fee = feeData.fees.find(f => f.id === currentFeeId);
                const amount = fee ? fee.amount : '';

                const response = await fetch(`/api/payment/details?amount=${amount}`, {
                    headers: {
                        'Authorization': `Bearer ${getAuthToken()}`
                    }
                });

                const data = await response.json();

                if (data.status === 'success' || data.upi_id) {
                    const details = data;
                    document.getElementById('paymentDetailsContent').innerHTML = `
                        <div style="background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 8px; padding: 16px; margin-bottom: 16px; text-align: center;">
                            <div style="margin-bottom: 12px;">
                                <img src="${details.qr_code}" alt="QR Code" style="width: 150px; height: 150px; border: 2px solid #0369a1; border-radius: 8px;">
                            </div>
                            <div style="font-weight: 600; color: #0369a1; margin-bottom: 8px;">Scan to Pay via UPI</div>
                            <div style="font-size: 1.1rem; color: #0f172a; font-weight: 600;">${details.upi_id || 'Not configured'}</div>
                        </div>
                        <div style="background: #fef3c7; border: 1px solid #fde68a; border-radius: 8px; padding: 16px;">
                            <div style="font-weight: 600; color: #92400e; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
                                <i class="material-icons" style="font-size: 20px;">account_balance</i>
                                Bank Transfer Details
                            </div>
                            <div style="color: #78350f; font-size: 0.9rem; line-height: 1.8;">
                                <div><strong>Bank:</strong> ${details.bank_name || 'Not configured'}</div>
                                <div><strong>Account No:</strong> ${details.account_number || 'Not configured'}</div>
                                <div><strong>IFSC Code:</strong> ${details.ifsc || 'Not configured'}</div>
                            </div>
                        </div>
                        <div style="margin-top: 16px; padding: 12px; background: #dcfce7; border: 1px solid #86efac; border-radius: 8px; font-size: 0.85rem; color: #166534;">
                            <i class="material-icons" style="font-size: 16px; vertical-align: middle;">info</i>
                            <strong>Instructions:</strong> Complete the payment using UPI or Bank Transfer, then click "Submit Payment Request" below. Your payment will be verified by the admin.
                        </div>
                    `;
                    document.getElementById('paymentDetailsSection').style.display = 'block';
                } else {
                    showAlert('Payment details not available', 'error');
                }
            } catch (error) {
                showAlert('Error loading payment details', 'error');
                console.error('Error:', error);
            }
        }

        // Mark as paid
        async function markAsPaid() {
            if (!currentFeeId) return;

            try {
                const response = await fetch(`${API_BASE}/mark-paid`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getAuthToken()}`
                    },
                    body: JSON.stringify({ 
                        fee_id: currentFeeId,
                        payment_method: 'UPI',
                        transaction_id: 'MANUAL-' + Date.now()
                    })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    showAlert('Payment request submitted! Waiting for admin approval.', 'success');
                    closeOtpModal();
                    loadFees();
                    loadPaymentHistory();
                } else {
                    showAlert(data.message || 'Failed to submit payment', 'error');
                }
            } catch (error) {
                showAlert('Error submitting payment. Please try again.', 'error');
                console.error('Error:', error);
            }
        }

        // Handle OTP input
        document.getElementById('otpInput').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 6);
        });

        // Handle Enter key in OTP input
        document.getElementById('otpInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyOtp();
            }
        });
    </script>
</body>
</html>
