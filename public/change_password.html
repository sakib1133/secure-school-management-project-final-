<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - School Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #4cc9f0;
            box-shadow: 0 0 0 2px rgba(76, 201, 240, 0.2);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #4cc9f0, #4895ef);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .error-message, .success-message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            font-size: 14px;
        }

        .error-message {
            background-color: rgba(255, 99, 71, 0.2);
            color: #ff6347;
            border: 1px solid #ff6347;
        }

        .success-message {
            background-color: rgba(50, 205, 50, 0.2);
            color: #32cd32;
            border: 1px solid #32cd32;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Change Your Password</h1>
        <form id="passwordForm">
            <div class="form-group">
                <input type="password" id="newPassword" placeholder="New Password" required>
            </div>
            <div class="form-group">
                <input type="password" id="confirmPassword" placeholder="Confirm New Password" required>
            </div>
            <button type="submit" class="btn">Update Password</button>
            <div id="message"></div>
        </form>
    </div>

    <script>
        document.getElementById('passwordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');
            
            // Clear previous messages
            messageDiv.className = '';
            messageDiv.textContent = '';
            
            // Validate passwords match
            if (newPassword !== confirmPassword) {
                messageDiv.className = 'error-message';
                messageDiv.textContent = 'Passwords do not match';
                return;
            }
            
            // Validate password strength (at least 6 characters)
            if (newPassword.length < 6) {
                messageDiv.className = 'error-message';
                messageDiv.textContent = 'Password must be at least 6 characters long';
                return;
            }
            
            try {
                const response = await fetch('/api/update-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: localStorage.getItem('username'),
                        newPassword: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (data.status === 'updated') {
                    messageDiv.className = 'success-message';
                    messageDiv.textContent = 'Password updated successfully! Redirecting...';
                    
                    // Redirect to student dashboard after a short delay
                    setTimeout(() => {
                        window.location.href = 'student/student_dashboard.html';
                    }, 1500);
                } else {
                    messageDiv.className = 'error-message';
                    messageDiv.textContent = data.message || 'Failed to update password';
                }
            } catch (error) {
                console.error('Error updating password:', error);
                messageDiv.className = 'error-message';
                messageDiv.textContent = 'An error occurred. Please try again.';
            }
        });
    </script>
</body>
</html>
